<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng Ký Tài Khoản Mới | AgroCom</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#42d411",
                        "background-light": "#f6f8f6",
                        "background-dark": "#152210",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-[#eaf3e7] dark:border-[#2a3a24] bg-white dark:bg-[#1a2a15] px-10 py-3 sticky top-0 z-50">
<div class="flex items-center gap-4 text-[#111b0d] dark:text-white">
<div class="size-6 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_6_330)">
<path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
</g>
<defs>
<clippath id="clip0_6_330"><rect fill="white" height="48" width="48"></rect></clippath>
</defs>
</svg>
</div>
<h2 class="text-[#111b0d] dark:text-white text-xl font-bold leading-tight tracking-[-0.015em]">AgroCom</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<nav class="flex items-center gap-9">
<a class="text-[#111b0d] dark:text-gray-300 text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Sản phẩm</a>
<a class="text-[#111b0d] dark:text-gray-300 text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Cộng đồng</a>
<a class="text-[#111b0d] dark:text-gray-300 text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Tin tức</a>
<a class="text-[#111b0d] dark:text-gray-300 text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Liên hệ</a>
</nav>
<button class="flex min-w-[100px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold leading-normal tracking-[0.015em] hover:brightness-95 transition-all">
<span>Đăng nhập</span>
</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center py-12 px-4 relative">
<!-- Background decorative elements -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none opacity-10">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary/30 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[120px]"></div>
</div>
<div class="layout-content-container flex flex-col max-w-[540px] w-full bg-white dark:bg-[#1a2a15] shadow-xl rounded-xl border border-[#eaf3e7] dark:border-[#2a3a24] overflow-hidden">
<!-- Page Heading Section -->
<div class="p-8 pb-4">
<div class="flex flex-col gap-2">
<h1 class="text-[#111b0d] dark:text-white text-3xl font-black leading-tight tracking-[-0.033em]">Đăng Ký Tài Khoản</h1>
<p class="text-[#5f9a4c] dark:text-[#a5d691] text-base font-normal leading-normal">Gia nhập mạng lưới nông nghiệp công nghệ cao hàng đầu</p>
</div>
</div>
<!-- Registration Form -->
<form class="p-8 pt-2 flex flex-col gap-4">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="text-[#111b0d] dark:text-gray-200 text-sm font-semibold leading-normal">Họ và tên</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#5f9a4c] text-xl">person</span>
<input class="form-input flex w-full rounded-lg text-[#111b0d] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#d5e7cf] dark:border-[#2a3a24] bg-[#f9fcf8] dark:bg-[#0f180a] h-12 pl-10 pr-4 placeholder:text-[#5f9a4c]/50 text-base transition-all" placeholder="Nguyễn Văn A" type="text"/>
</div>
</div>
<!-- Email & Phone Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-[#111b0d] dark:text-gray-200 text-sm font-semibold leading-normal">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#5f9a4c] text-xl">mail</span>
<input class="form-input flex w-full rounded-lg text-[#111b0d] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#d5e7cf] dark:border-[#2a3a24] bg-[#f9fcf8] dark:bg-[#0f180a] h-12 pl-10 pr-4 placeholder:text-[#5f9a4c]/50 text-base transition-all" placeholder="example@gmail.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-[#111b0d] dark:text-gray-200 text-sm font-semibold leading-normal">Số điện thoại</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#5f9a4c] text-xl">call</span>
<input class="form-input flex w-full rounded-lg text-[#111b0d] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#d5e7cf] dark:border-[#2a3a24] bg-[#f9fcf8] dark:bg-[#0f180a] h-12 pl-10 pr-4 placeholder:text-[#5f9a4c]/50 text-base transition-all" placeholder="09xx xxx xxx" type="tel"/>
</div>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="text-[#111b0d] dark:text-gray-200 text-sm font-semibold leading-normal">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#5f9a4c] text-xl">lock</span>
<input class="form-input flex w-full rounded-lg text-[#111b0d] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#d5e7cf] dark:border-[#2a3a24] bg-[#f9fcf8] dark:bg-[#0f180a] h-12 pl-10 pr-10 placeholder:text-[#5f9a4c]/50 text-base transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-2">
<label class="text-[#111b0d] dark:text-gray-200 text-sm font-semibold leading-normal">Xác nhận mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#5f9a4c] text-xl">lock_reset</span>
<input class="form-input flex w-full rounded-lg text-[#111b0d] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#d5e7cf] dark:border-[#2a3a24] bg-[#f9fcf8] dark:bg-[#0f180a] h-12 pl-10 pr-10 placeholder:text-[#5f9a4c]/50 text-base transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start gap-3 py-2">
<input class="mt-1 h-5 w-5 rounded border-[#d5e7cf] text-primary focus:ring-primary bg-[#f9fcf8] cursor-pointer" id="terms" type="checkbox"/>
<label class="text-sm text-[#111b0d] dark:text-gray-300 leading-tight cursor-pointer" for="terms">
                        Tôi đồng ý với các <a class="text-primary font-bold hover:underline" href="#">điều khoản và điều kiện</a> của AgroCom về bảo mật và sử dụng dữ liệu.
                    </label>
</div>
<!-- Register Button -->
<button class="w-full bg-[#1b430e] dark:bg-primary text-white font-bold py-4 rounded-xl shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2" type="submit">
<span>Đăng ký ngay</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Footer Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-[#d5e7cf] dark:border-[#2a3a24]"></div>
<span class="flex-shrink mx-4 text-gray-400 text-xs uppercase tracking-widest">Hoặc</span>
<div class="flex-grow border-t border-[#d5e7cf] dark:border-[#2a3a24]"></div>
</div>
<!-- Already have account -->
<div class="text-center">
<p class="text-sm text-[#5f9a4c] dark:text-gray-400">
                        Đã có tài khoản? 
                        <a class="text-[#111b0d] dark:text-primary font-bold hover:underline ml-1" href="#">Đăng nhập</a>
</p>
</div>
</form>
<!-- Card Bottom Accent -->
<div class="h-2 w-full bg-primary"></div>
</div>
</main>
<footer class="py-8 px-40 border-t border-[#eaf3e7] dark:border-[#2a3a24] bg-white dark:bg-[#1a2a15]">
<div class="max-w-[960px] mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
<div class="flex items-center gap-2 text-gray-400">
<span class="text-xs">© 2024 AgroCom. Bản quyền thuộc về Công ty Nông Nghiệp Xanh.</span>
</div>
<div class="flex gap-6">
<a class="text-xs text-gray-500 hover:text-primary" href="#">Quy định pháp lý</a>
<a class="text-xs text-gray-500 hover:text-primary" href="#">Trợ giúp</a>
<a class="text-xs text-gray-500 hover:text-primary" href="#">Chính sách bảo mật</a>
</div>
</div>
</footer>
</body></html>
