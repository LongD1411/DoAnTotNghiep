<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Khôi Phục Mật Khẩu - AgroPlatform</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3bbd0f",
                        "background-light": "#f6f8f6",
                        "background-dark": "#152210",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-[#111b0d] dark:text-white transition-colors duration-200">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Header/Navigation (Simplified for Auth Pages) -->
<div class="px-4 lg:px-40 flex justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[960px] flex-1">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-[#eaf3e7] dark:border-b-white/10 px-4 lg:px-10 py-3">
<div class="flex items-center gap-4 text-primary">
<div class="size-8">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_6_330)">
<path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
</g>
<defs>
<clippath id="clip0_6_330"><rect fill="white" height="48" width="48"></rect></clippath>
</defs>
</svg>
</div>
<h2 class="text-[#111b0d] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">AgroPlatform</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="flex items-center gap-4">
<a class="text-[#111b0d] dark:text-white text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Trợ giúp</a>
</div>
</div>
</header>
</div>
</div>
<!-- Main Content Area -->
<main class="flex flex-1 items-center justify-center px-4 py-12">
<div class="w-full max-w-[480px] bg-white dark:bg-[#1c2e15] shadow-xl rounded-xl p-8 lg:p-10 border border-[#eaf3e7] dark:border-white/5">
<!-- Icon representation -->
<div class="flex justify-center mb-6">
<div class="bg-primary/10 p-4 rounded-full">
<span class="material-symbols-outlined text-primary text-4xl">lock_reset</span>
</div>
</div>
<!-- Headline Text -->
<div class="flex flex-col gap-2 mb-8">
<h1 class="text-[#111b0d] dark:text-white tracking-light text-[32px] font-bold leading-tight text-center">Khôi Phục Mật Khẩu</h1>
<p class="text-[#5f7a55] dark:text-white/70 text-base font-normal leading-normal text-center">
                            Nhập email của bạn để nhận hướng dẫn khôi phục
                        </p>
</div>
<!-- Recovery Form -->
<form action="#" class="flex flex-col gap-6" method="POST">
<!-- TextField -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-[#111b0d] dark:text-white text-sm font-semibold leading-normal pb-2">Địa chỉ Email</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#5f9a4c]">mail</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111b0d] focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#d5e7cf] dark:border-white/10 bg-[#f9fcf8] dark:bg-background-dark/50 focus:border-primary h-14 placeholder:text-[#5f9a4c]/60 pl-12 pr-4 text-base font-normal leading-normal dark:text-white transition-all" placeholder="vidu@email.com" required="" type="email" value=""/>
</div>
</label>
</div>
<!-- SingleButton -->
<div class="flex flex-col gap-4 mt-2">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-5 flex-1 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:brightness-105 active:scale-[0.98] transition-all shadow-md shadow-primary/20" type="submit">
<span class="truncate">Gửi yêu cầu</span>
</button>
</div>
</form>
<!-- Bottom Link -->
<div class="mt-8 flex justify-center">
<a class="flex items-center gap-2 text-primary text-sm font-bold leading-normal hover:underline group" href="#">
<span class="material-symbols-outlined text-sm transition-transform group-hover:-translate-x-1">arrow_back</span>
                            Quay lại đăng nhập
                        </a>
</div>
</div>
</main>
<!-- Footer -->
<footer class="px-4 py-8">
<div class="max-w-[960px] mx-auto flex flex-col items-center gap-4 border-t border-[#eaf3e7] dark:border-white/10 pt-8">
<div class="flex gap-6">
<a class="text-[#5f7a55] dark:text-white/50 text-xs hover:text-primary" href="#">Điều khoản</a>
<a class="text-[#5f7a55] dark:text-white/50 text-xs hover:text-primary" href="#">Chính sách bảo mật</a>
<a class="text-[#5f7a55] dark:text-white/50 text-xs hover:text-primary" href="#">Liên hệ</a>
</div>
<p class="text-[#5f7a55] dark:text-white/40 text-[10px]">© 2024 AgroPlatform. All rights reserved.</p>
</div>
</footer>
</div>
</div>
</body></html>
